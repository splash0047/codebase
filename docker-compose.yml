version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ckai_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ckai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ckai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-codebase_knowledge}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ckai"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.17-community
    container_name: ckai_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/ckai_secret}
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
      NEO4J_server_memory_pagecache_size: "256m"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ckai_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ckai_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ckai_worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --queues=high_priority,default,low_priority --concurrency=4

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
